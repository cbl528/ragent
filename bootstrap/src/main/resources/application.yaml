spring:
  application:
    name: bootstrap
server:
  port: 8001

# 是否开启Trace
rag:
  trace:
    enabled: false
  vector:
    type: pg
  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000

# SaToken配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
  eval:
    enabled: true
